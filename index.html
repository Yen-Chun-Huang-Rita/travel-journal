<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鈞逸和雁君的旅遊誌</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* FONT SYSTEM: Chinese = Noto Serif TC, Latin/English = Cormorant Garamond */
:lang(zh), :lang(zh-TW) { font-family: 'Noto Serif TC', serif; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--ink:#0d0900;--parchment:#f5f0e8;--warm-cream:#ede8d8;--gold:#b8841e;--gold-light:#e8c878;--rust:#8b4513;--sage:#6b7c5a;--deep-teal:#1e3838;--muted:#5a5040;--card-bg:rgba(245,240,232,0.92);--shadow:0 4px 24px rgba(26,18,8,0.12);--shadow-hover:0 8px 40px rgba(26,18,8,0.2);
  --font-zh:'Noto Serif TC',serif;--font-en:'Cormorant Garamond',serif}
*{margin:0;padding:0;box-sizing:border-box}
/* Unified font: all text uses Noto Serif TC (covers CJK), Cormorant Garamond as Latin fallback */
html{font-family:var(--font-zh);-webkit-font-smoothing:antialiased}
body{font-family:var(--font-zh);background:var(--parchment);color:var(--ink);font-size:15px;min-height:100vh;background-image:radial-gradient(ellipse at 20% 50%,rgba(201,151,58,0.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(42,74,74,0.06) 0%,transparent 60%)}
.app{display:flex;min-height:100vh}
/* SIDEBAR */
.sidebar{width:260px;min-height:100vh;background:var(--deep-teal);position:fixed;left:0;top:0;display:flex;flex-direction:column;z-index:100;box-shadow:4px 0 20px rgba(0,0,0,0.2)}
.sidebar-brand{padding:28px 24px 20px;border-bottom:1px solid rgba(201,151,58,0.2)}
.brand-title{font-family:var(--font-zh);font-size:17px;font-weight:400;color:rgba(232,200,120,0.75);letter-spacing:2px;line-height:1.4}
.brand-main{font-family:var(--font-zh);font-size:26px;font-weight:600;color:var(--gold-light);letter-spacing:1px;line-height:1.3}
.brand-sub{font-size:11px;color:rgba(232,200,120,0.45);letter-spacing:3px;text-transform:uppercase;margin-top:4px;font-family:var(--font-en)}
.sidebar-nav{padding:16px 0;flex:1}
.nav-section-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:10px 24px 5px;font-family:var(--font-en)}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 24px;cursor:pointer;color:rgba(255,255,255,0.8);font-size:15px;transition:all 0.2s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(201,151,58,0.1);color:var(--gold-light)}
.nav-item.active{background:rgba(201,151,58,0.15);color:var(--gold-light);border-left-color:var(--gold)}
.nav-icon{font-size:18px;width:20px;text-align:center}
.sidebar-stats{padding:16px 24px;border-top:1px solid rgba(201,151,58,0.15);display:flex;gap:16px}
.stat-item{text-align:center;flex:1}
.stat-num{font-family:var(--font-en);font-size:26px;color:var(--gold);font-weight:600}
.stat-label{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1px}
/* MAIN */
.main{margin-left:260px;flex:1;display:flex;flex-direction:column}
.topbar{background:rgba(245,240,232,0.95);backdrop-filter:blur(10px);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(201,151,58,0.2);position:sticky;top:0;z-index:50}
.page-title{font-family:var(--font-en);font-size:24px;font-weight:400;font-style:italic;color:var(--deep-teal)}
/* BUTTONS */
.btn{padding:9px 20px;border:none;border-radius:2px;cursor:pointer;font-family:var(--font-zh);font-size:14px;transition:all 0.2s}
.btn-primary{background:var(--gold);color:white;letter-spacing:1px}
.btn-primary:hover{background:#b5852e;transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,151,58,0.3)}
.btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}
.btn-outline:hover{background:var(--gold);color:white}
.btn-teal{background:var(--deep-teal);color:white}
.btn-teal:hover{background:#1d3535}
.btn-danger{background:#c0392b;color:white;font-size:13px;padding:5px 11px}
.btn-danger:hover{background:#a93226}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-xs{padding:3px 9px;font-size:12px}
/* CONTENT */
.content{padding:32px 40px;flex:1}
.page{display:none}
.page.active{display:block}
/* TRIP CARDS */
.section-title{font-family:var(--font-zh);font-size:32px;font-weight:300;color:var(--deep-teal);font-style:italic}
.section-subtitle{font-size:13px;color:var(--muted);margin-top:3px;letter-spacing:1px}
.trips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:22px}
.import-opt-selected{border-color:var(--gold)!important;background:rgba(201,151,58,0.06)!important}
.country-group{margin-bottom:36px}
.country-group:last-child{margin-bottom:0}
.trip-card{background:var(--card-bg);border:1px solid rgba(201,151,58,0.2);border-radius:4px;overflow:hidden;cursor:pointer;transition:all 0.3s;box-shadow:var(--shadow)}
.trip-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover)}
.trip-card-banner{height:140px;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative;overflow:hidden;background-size:cover;background-position:center}
.trip-card-banner-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center}
.trip-card-body{padding:18px}
.trip-country{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-family:var(--font-en);margin-bottom:5px}
.trip-name{font-family:var(--font-zh);font-size:22px;font-weight:600;color:var(--ink);margin-bottom:7px}
.trip-dates{font-size:13px;color:var(--muted);margin-bottom:10px}
.trip-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(42,74,74,0.08);color:var(--deep-teal);letter-spacing:0.5px}
.trip-card-footer{padding:10px 18px;border-top:1px solid rgba(201,151,58,0.12);display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted)}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,18,8,0.6);z-index:200;backdrop-filter:blur(4px);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--parchment);border-radius:6px;width:90%;max-width:680px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:modalIn 0.3s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:none}}
.modal-header{padding:24px 30px 18px;border-bottom:1px solid rgba(201,151,58,0.2);display:flex;justify-content:space-between;align-items:flex-start}
.modal-title{font-family:var(--font-zh);font-size:26px;font-weight:400;font-style:italic;color:var(--deep-teal)}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;padding:4px}
.modal-close:hover{color:var(--ink)}
.modal-body{padding:22px 30px}
.modal-footer{padding:14px 30px 22px;display:flex;gap:12px;justify-content:flex-end}
/* FORMS */
.form-group{margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
label{display:block;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-family:var(--font-en)}
input[type="text"],input[type="number"],textarea,select{width:100%;padding:9px 13px;border:1px solid rgba(201,151,58,0.3);border-radius:2px;background:white;font-family:var(--font-zh);font-size:15px;color:var(--ink);transition:border-color 0.2s;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,151,58,0.1)}
textarea{resize:vertical;min-height:80px}
/* DETAIL HEADER */
.detail-header{background:var(--deep-teal);padding:28px 40px;margin:-32px -40px 28px;display:flex;gap:22px;align-items:flex-start;position:relative;overflow:hidden}
.detail-header::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='50' cy='50' r='40' stroke='rgba(201,151,58,0.08)' stroke-width='1' fill='none'/%3E%3C/svg%3E") 90% center/300px no-repeat}
.detail-cover{width:80px;height:80px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative;z-index:1;flex-shrink:0;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);overflow:hidden;cursor:pointer}
.detail-cover img{width:100%;height:100%;object-fit:cover}
.detail-cover-hint{position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;font-size:12px;color:white;opacity:0;transition:opacity 0.2s}
.detail-cover:hover .detail-cover-hint{opacity:1}
.detail-meta{flex:1;position:relative;z-index:1}
.detail-country{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-family:var(--font-en);margin-bottom:6px}
.detail-name{font-family:var(--font-zh);font-size:34px;font-weight:600;color:white;margin-bottom:6px}
.detail-info{font-size:13px;color:rgba(255,255,255,0.6);display:flex;gap:18px;flex-wrap:wrap}
.detail-actions{display:flex;gap:8px;align-items:flex-start;position:relative;z-index:1}
/* TABS */
.tabs{display:flex;border-bottom:2px solid rgba(201,151,58,0.2);margin-bottom:24px;overflow-x:auto}
.tab{padding:10px 18px;cursor:pointer;font-size:15px;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;white-space:nowrap;border-radius:8px 8px 0 0;position:relative}
.tab:hover{color:var(--ink);background:rgba(184,132,30,0.08)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:700;background:rgba(184,132,30,0.12);box-shadow:inset 0 -3px 0 var(--gold),0 -1px 0 rgba(184,132,30,0.3),1px 0 0 rgba(184,132,30,0.15),-1px 0 0 rgba(184,132,30,0.15);text-shadow:0 0 12px rgba(184,132,30,0.4)}
.tab-content{display:none}
.tab-content.active{display:block}
/* ITINERARY */
.itin-table{width:100%;border-collapse:collapse;font-size:15px}
.itin-table thead tr{background:rgba(42,74,74,0.07);border-bottom:2px solid rgba(201,151,58,0.2)}
.itin-table thead th{padding:7px 10px;text-align:left;font-size:13px;font-weight:600;color:var(--muted);letter-spacing:0.5px;white-space:nowrap}
.itin-table tbody tr{border-bottom:1px solid rgba(201,151,58,0.08);transition:background 0.15s}
.itin-table tbody tr:hover{background:rgba(201,151,58,0.04)}
.itin-table tbody tr:last-child{border-bottom:none}
.itin-table td{padding:6px 10px;vertical-align:middle;line-height:1.4}
.itin-date{font-size:15px;color:var(--deep-teal);white-space:nowrap;font-weight:600}
.itin-time{font-family:var(--font-en);font-size:18px;color:#6a4000;white-space:nowrap;font-weight:700}
.itin-name{color:var(--ink);font-size:16px;font-weight:500}
.itin-note{color:#4a4030;font-size:15px}
.itin-actions{white-space:nowrap;text-align:right}
/* CHECKLIST */
.checklist-category{margin-bottom:18px}
.checklist-cat-title{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#8a6010;font-family:var(--font-en);margin-bottom:8px;font-weight:600}
.checklist-item{display:flex;align-items:center;gap:10px;padding:9px 16px;background:white;border:1px solid rgba(201,151,58,0.12);border-radius:2px;margin-bottom:5px;cursor:pointer;transition:all 0.2s;font-size:16px}
.checklist-item:hover{border-color:rgba(201,151,58,0.3)}
.checklist-item.checked{background:rgba(107,124,90,0.05);opacity:0.7}
.checklist-item input[type="checkbox"]{accent-color:var(--sage);width:15px;height:15px;cursor:pointer;flex-shrink:0}
.checklist-item.checked .item-text{text-decoration:line-through;color:var(--muted)}
/* EXPENSE */
.expense-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.expense-stat{background:white;border:1px solid rgba(201,151,58,0.2);border-radius:4px;padding:16px 18px;text-align:center}
.expense-stat-amount{font-family:var(--font-en);font-size:30px;font-weight:700;color:#1e3838}
.expense-stat-label{font-size:14px;color:#2a2018;margin-top:3px;letter-spacing:0.3px;font-weight:500}
.expense-table{width:100%;border-collapse:collapse;background:white;border:1px solid rgba(201,151,58,0.15);border-radius:4px;overflow:hidden;font-size:19px}
.expense-table th{background:rgba(42,74,74,0.06);padding:10px 14px;text-align:left;font-size:14px;letter-spacing:0.5px;text-transform:none;color:#2a2018;font-family:var(--font-zh);font-weight:700}
.expense-table td{padding:11px 14px;border-top:1px solid rgba(201,151,58,0.1);color:#0d0900;font-size:19px}
.expense-table tr:hover td{background:rgba(245,240,232,0.8)}
.expense-cat-badge{font-size:14px;padding:4px 10px;border-radius:20px;font-weight:600}
.budget-bar-wrap{margin:6px 0 18px}
.budget-bar-bg{background:rgba(201,151,58,0.15);border-radius:2px;height:6px;overflow:hidden}
.budget-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--rust));transition:width 0.5s}
.budget-bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:3px}
/* CHART */
.chart-dashboard{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
.chart-card{background:white;border:1px solid rgba(201,151,58,0.15);border-radius:4px;padding:18px}
.chart-card-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-family:var(--font-en);margin-bottom:12px}
.chart-card canvas{max-height:200px}
/* PHOTOS */
.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.photo-card{aspect-ratio:1;border-radius:4px;overflow:hidden;border:1px solid rgba(201,151,58,0.2);position:relative;cursor:pointer;background:var(--warm-cream)}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s}
.photo-card:hover img{transform:scale(1.05)}
.photo-card-del{position:absolute;top:5px;right:5px;background:rgba(192,57,43,0.85);color:white;border:none;border-radius:2px;font-size:11px;padding:2px 6px;cursor:pointer;opacity:0;transition:opacity 0.2s}
.photo-card:hover .photo-card-del{opacity:1}
.photo-upload-btn{aspect-ratio:1;border:2px dashed rgba(201,151,58,0.35);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;background:white;color:var(--muted);font-size:12px;gap:7px}
.photo-upload-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,151,58,0.04)}
/* NOTES */
.notes-area{background:white;border:1px solid rgba(201,151,58,0.2);border-radius:4px;padding:18px}
.notes-editor{width:100%;border:none;outline:none;font-family:var(--font-zh);font-size:16px;color:var(--ink);resize:none;background:transparent;line-height:1.9;min-height:200px}
.notes-fontbar{display:flex;align-items:center;gap:6px;margin-bottom:10px;padding:6px 10px;background:white;border:1px solid rgba(201,151,58,0.2);border-radius:2px;width:fit-content}
.notes-fontbar label{font-size:12px;color:var(--muted);letter-spacing:0;text-transform:none;margin:0;font-family:var(--font-zh)}
.notes-fontsize-btn{width:28px;height:28px;border:1px solid rgba(201,151,58,0.3);border-radius:2px;background:white;cursor:pointer;font-size:13px;color:var(--deep-teal);display:flex;align-items:center;justify-content:center;font-weight:600;transition:all 0.15s}
.notes-fontsize-btn:hover{background:var(--gold);color:white;border-color:var(--gold)}
.notes-fontsize-val{font-family:var(--font-en);font-size:14px;color:var(--ink);min-width:32px;text-align:center;font-weight:600}
/* ANALYTICS */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
.analytics-card{background:white;border:1px solid rgba(201,151,58,0.15);border-radius:4px;padding:20px}
.analytics-card.full{grid-column:1/-1}
.analytics-title{font-family:var(--font-zh);font-size:18px;color:var(--deep-teal);margin-bottom:12px}
.analytics-card canvas{max-height:240px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.kpi-card{background:white;border:1px solid rgba(201,151,58,0.2);border-radius:4px;padding:14px;text-align:center}
.kpi-value{font-family:var(--font-zh);font-size:30px;font-weight:600;color:var(--deep-teal)}
.kpi-label{font-size:12px;color:var(--muted);letter-spacing:1px;margin-top:3px}
/* COMP TABLE */
.comp-table{width:100%;border-collapse:collapse;font-size:13px}
.comp-table th{background:rgba(42,74,74,0.08);padding:9px 12px;text-align:left;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:var(--font-en);font-weight:400}
.comp-table td{padding:9px 12px;border-top:1px solid rgba(201,151,58,0.1)}
.comp-table tr:hover td{background:rgba(245,240,232,0.5)}
/* EMOJI PICKER */
.emoji-picker-wrap{display:flex;gap:6px;flex-wrap:wrap;padding:10px;background:white;border:1px solid rgba(201,151,58,0.2);border-radius:4px;max-height:120px;overflow-y:auto}
/* SECTION ACTIONS */
.section-actions{display:flex;gap:8px;margin-bottom:14px;justify-content:flex-end;flex-wrap:wrap;align-items:center}
/* ROW ACTIONS */
.row-actions{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:2px 5px;border-radius:2px;transition:all 0.15s}
.icon-btn:hover{color:var(--ink);background:rgba(201,151,58,0.1)}
/* MISC */
.file-input{display:none}
.search-bar{display:flex;align-items:center;gap:8px;background:white;border:1px solid rgba(201,151,58,0.25);border-radius:2px;padding:0 12px;min-width:200px;height:34px;box-sizing:border-box}
.search-bar input{border:none;outline:none;font-family:var(--font-zh);font-size:13px;background:transparent;width:100%;color:var(--ink)}
.back-btn{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.65);cursor:pointer;background:none;border:none;padding:0;transition:color 0.2s;position:relative;z-index:1}
.back-btn:hover{color:var(--gold-light)}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:0.5}
.empty-text{font-size:14px}
.badge-green{background:rgba(107,124,90,0.15);color:var(--sage);font-size:10px;padding:2px 8px;border-radius:20px}
.photo-modal-img{width:100%;max-height:60vh;object-fit:contain;border-radius:4px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:rgba(201,151,58,0.3);border-radius:3px}
/* cover photo picker in new trip modal */
.country-group{margin-bottom:32px}
.country-group-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(201,151,58,0.2)}
.country-group-name{font-family:var(--font-zh);font-size:16px;font-weight:600;color:var(--deep-teal);letter-spacing:1px}
.country-group-count{font-size:11px;color:var(--muted);background:rgba(201,151,58,0.12);padding:2px 10px;border-radius:20px}
#filter-country:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,151,58,0.1)}
/* keep existing styles */
.cover-preview img{width:100%;height:100%;object-fit:cover}
.cover-preview{width:100%;height:90px;background:rgba(42,74,74,0.1);border:1px dashed rgba(201,151,58,0.3);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative}
.cover-preview-text{font-size:12px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:5px}
/* TOAST */

<script>
// ===== STATE =====
const LEGACY_KEYS = ['yanJunTrips_v4_backup','yanJunTrips','travelTrips','trips'];
const CURRENT_KEY = 'yanJunTrips_v4';
const DB_NAME = 'TravelJournalDB';
const DB_STORE = 'kv';
const SHEETS_API = 'https://script.google.com/macros/s/AKfycbx4o3czgg-jzdHnfev-vfWSPWnS86PulcALsLdvaKtt2qg-62vh5zPplRWkgNhY-Q/exec';

// ===== CLOUD SYNC =====
let _syncTimer = null;
let _isSyncing = false;

// JSONP pull - works from file:// (bypasses CORS)
function cloudPull() {
  return new Promise((resolve) => {
    const cbName = '_cb' + Date.now();
    const script = document.createElement('script');
    const timer = setTimeout(() => {
      delete window[cbName];
      script.remove();
      resolve(null);
    }, 8000);
    window[cbName] = (data) => {
      clearTimeout(timer);
      delete window[cbName];
      script.remove();
      resolve(Array.isArray(data) && data.length > 0 ? data : null);
    };
    script.src = SHEETS_API + '?callback=' + cbName + '&t=' + Date.now();
    script.onerror = () => { clearTimeout(timer); delete window[cbName]; resolve(null); };
    document.head.appendChild(script);
  });
}

// POST push - no-cors works from file://
async function cloudPush(tripsData) {
  const payload = JSON.stringify({trips: tripsData});
  try {
    const res = await fetch(SHEETS_API, {
      method: 'POST',
      headers: {'Content-Type':'text/plain'},
      body: payload
    });
    if(res.ok) return;
  } catch(e) {}
  try {
    await fetch(SHEETS_API, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type':'text/plain'},
      body: payload
    });
  } catch(e) {}
}

function updateSyncIndicator(status) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-txt');
  if(!dot||!txt) return;
  const map = {
    syncing: {color:'#c9973a', text:'同步中…'},
    ok:      {color:'#6b7c5a', text:'雲端已同步'},
    local:   {color:'#8a7f6e', text:'本機儲存'},
    error:   {color:'#c0392b', text:'同步失敗'},
  };
  const s = map[status]||map.local;
  dot.style.background = s.color;
  txt.textContent = s.text;
}

function schedulePush() {
  if(_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(async () => {
    if(_isSyncing) return;
    _isSyncing = true;
    updateSyncIndicator('syncing');
    await cloudPush(trips);
    _isSyncing = false;
    updateSyncIndicator('ok');
  }, 1500); // debounce 1.5s after last change
}

// IndexedDB helpers - survives refresh on file:// and https://
let _db = null;
function _getDB(){
  if(_db) return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror = e => rej(e.target.error);
  });
}
function _idbGet(key){
  return _getDB().then(db => new Promise((res,rej)=>{
    const req = db.transaction(DB_STORE,'readonly').objectStore(DB_STORE).get(key);
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  }));
}
function _idbSet(key, val){
  return _getDB().then(db => new Promise((res,rej)=>{
    const req = db.transaction(DB_STORE,'readwrite').objectStore(DB_STORE).put(val, key);
    req.onsuccess = () => res();
    req.onerror = e => rej(e.target.error);
  }));
}

async function loadTrips() {
  const mergedIds = new Set();
  let merged = [];
  function mergeArr(arr){
    if(!Array.isArray(arr)) return;
    arr.forEach(t=>{
      if(t&&t.id&&t.name&&!mergedIds.has(t.id)){merged.push(t);mergedIds.add(t.id);}
    });
  }
  // 1. 雲端 Google Sheets（最高優先，兩人共用）
  updateSyncIndicator('syncing');
  const cloud = await cloudPull();
  if(cloud && cloud.length) {
    mergeArr(cloud);
    updateSyncIndicator('ok');
  } else {
    updateSyncIndicator('local');
  }
  // 2. IndexedDB（本機備份）
  try{ const raw=await _idbGet(CURRENT_KEY); if(raw) mergeArr(JSON.parse(raw)); }catch(e){}
  // 3. localStorage + legacy
  [CURRENT_KEY,...LEGACY_KEYS].forEach(k=>{
    try{ mergeArr(JSON.parse(localStorage.getItem(k)||'[]')); }catch(e){}
  });
  // 4. window.storage (Claude artifact env)
  if(window.storage&&window.storage.get){
    try{ const r=await window.storage.get(CURRENT_KEY); if(r&&r.value) mergeArr(JSON.parse(r.value)); }catch(e){}
  }
  // Persist merged to all local stores
  if(merged.length){
    const data=JSON.stringify(merged);
    try{ localStorage.setItem(CURRENT_KEY,data); }catch(e){}
    _idbSet(CURRENT_KEY,data).catch(()=>{});
    if(window.storage&&window.storage.set) window.storage.set(CURRENT_KEY,data).catch(()=>{});
  }
  return merged;
}

function renderTrips(){

  if(!filtered.length){
    grid.style.display='grid';
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🌍</div><div class="empty-text">${trips.length?'查無符合條件的旅程':'尚無旅程，點擊「新增旅程」開始規劃'}</div></div>`;
    return;
  }

  const tripCardHTML=(t)=>{
    const spent=(t.expenses||[]).reduce((s,e)=>s+e.amount,0);
    const days=calcDays(t.startDate,t.endDate);
    const bannerStyle=t.coverPhoto?`background-image:url('${t.coverPhoto}');background-size:cover;background-position:center`:`background:${t.bgColor||BG_COLORS[0]}`;
    return `<div class="trip-card" onclick="openTrip('${t.id}')">
      <div class="trip-card-banner" style="${bannerStyle}">
        ${t.hideEmoji?'':(t.coverPhoto?`<div class="trip-card-banner-overlay"><span style="font-size:44px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5))">${t.emoji}</span></div>`:`<span>${t.emoji}</span>`)}
      </div>
      <div class="trip-card-body">
        <div class="trip-country">${t.country}</div>
        <div class="trip-name">${t.name}</div>
        <div class="trip-dates">${t.startDate||'--'} → ${t.endDate||'--'} · ${days} 天</div>
        <div class="trip-tags">${(t.tags||[]).map(g=>`<span class="tag">${g}</span>`).join('')}</div>
      </div>
      <div class="trip-card-footer">
        <span>NT$ ${spent.toLocaleString()}${t.budget?' / '+Number(t.budget).toLocaleString():''}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;color:var(--muted)">${days} 天</span>
          <button onclick="copyTrip('${t.id}',event)" style="background:rgba(201,151,58,0.12);border:1px solid rgba(201,151,58,0.3);border-radius:2px;padding:2px 9px;font-size:11px;cursor:pointer;color:var(--gold);font-family:var(--font-zh);transition:all 0.15s" onmouseover="this.style.background='rgba(201,151,58,0.25)'" onmouseout="this.style.background='rgba(201,151,58,0.12)'">複製</button>
        </div>
      </div>
    </div>`;
  };

  if(filterCountry){
    // Single country: flat grid
    grid.style.display='grid';
    grid.innerHTML=filtered.map(tripCardHTML).join('');
  } else {
    // All countries: block layout, each group has its own inner grid
    grid.style.display='block';
    const byCountry={};
    filtered.forEach(t=>{
      const c=t.country||'未指定';
      if(!byCountry[c])byCountry[c]=[];
      byCountry[c].push(t);
    });
    const sortedCountries=Object.keys(byCountry).sort((a,b)=>a.localeCompare(b,'zh-TW'));
    grid.innerHTML=sortedCountries.map(country=>{
      const countryTrips=byCountry[country];
      return `<div class="country-group">
        <div class="country-group-header">
          <span class="country-group-name">📍 ${country}</span>
          <span class="country-group-count">${countryTrips.length} 個旅程</span>
        </div>
        <div class="trips-grid">${countryTrips.map(tripCardHTML).join('')}</div>
      </div>`;
    }).join('');
  }
}

function calcDays(s,e){if(!s||!e)return'?';return Math.max(1,Math.round((new Date(e)-new Date(s))/86400000)+1);}

// ===== COPY TRIP =====
function copyTrip(id, event){
  if(event) event.stopPropagation();
  const src=trips.find(t=>t.id===id);if(!src)return;
  const now=Date.now();
  // Deep clone all sub-arrays, assign new ids to all items
  function cloneItems(arr){
    return (arr||[]).map((item,i)=>({...item,id:(now+i+1).toString()+Math.random().toString(36).slice(2)}));
  }
  const copy={
    ...JSON.parse(JSON.stringify(src)),
    id:now.toString(),
    name:'（複製）'+src.name,
    itinerary:cloneItems(src.itinerary),
    checklist:cloneItems(src.checklist),
    hiking:cloneItems(src.hiking),
    expenses:cloneItems(src.expenses),
    photos:cloneItems(src.photos),
  };
  trips.push(copy);
  saveTrips();
  filterCountry='';
  document.getElementById('filter-country').value='';
  updateCountryFilterDropdown();
  showPage('trips');
  updateStats();
  setTimeout(()=>toast('旅程已複製','📋'),100);
}

function renderItinerary(trip){
  const itin=trip.itinerary||[];
  const actions=`<div class="section-actions">
    <button class="btn btn-outline btn-sm" onclick="exportTabExcel('itinerary')">📤 匯出</button>
    <label class="btn btn-outline btn-sm" style="cursor:pointer">📥 匯入<input type="file" accept=".xlsx" class="file-input" onchange="importItineraryExcel(event)"></label>
    <button class="btn btn-primary btn-sm" onclick="openActivityModal()">＋ 新增行程</button>
  </div>`;
  if(!itin.length)return actions+`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">尚未規劃行程</div></div>`;
  const byDay={};
  // Sort itinerary by date then time
  const sorted=[...itin].sort((a,b)=>{
    const dc=(a.day||'').localeCompare(b.day||'');
    if(dc!==0)return dc;
    return (a.time||'').localeCompare(b.time||'');
  });
  function fmtDay(d){
    if(!d)return'';
    if(/^\d{4}-\d{2}-\d{2}$/.test(d)){
      const dt=new Date(d);
      const m=dt.getMonth()+1,dd=dt.getDate(),wd=['日','一','二','三','四','五','六'][dt.getDay()];
      return `${m}/${dd}（${wd}）`;
    }
    return d;
  }
  const rows=sorted.map(a=>{
    const dateLabel=a.dayEnd&&a.dayEnd!==a.day?`${fmtDay(a.day)}～${fmtDay(a.dayEnd)}`:fmtDay(a.day);
    return `<tr>
      <td class="itin-date">${dateLabel}</td>
      <td class="itin-time">${a.time||''}</td>
      <td class="itin-name">${a.name}</td>
      <td class="itin-note">${a.note||''}</td>
      <td class="itin-actions">
        <button class="icon-btn" onclick="openActivityModal('${a.id}')">✏️</button>
        <button class="icon-btn" onclick="deleteActivity('${a.id}')">🗑️</button>
      </td>
    </tr>`;
  }).join('');
  return actions+`<table class="itin-table">
    <thead><tr><th>日期</th><th>時間</th><th>活動</th><th>備註</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function _buildActivityDates(trip){
  const sel=document.getElementById('act-day');
  const selEnd=document.getElementById('act-day-end');
  sel.innerHTML=''; selEnd.innerHTML='';
  const start=trip.startDate,end=trip.endDate;
  const days=[];
  if(start&&end){
    const s=new Date(start),e=new Date(end);
    for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
      const iso=d.toISOString().slice(0,10);
      const m=d.getMonth()+1,dd=d.getDate(),wd=['日','一','二','三','四','五','六'][d.getDay()];
      days.push({val:iso,label:`${m}/${dd}（${wd}）`});
    }
  } else {
    for(let i=1;i<=30;i++) days.push({val:'Day '+i,label:'Day '+i});
  }
  // start select (no empty option)
  days.forEach(({val,label})=>{
    const o=document.createElement('option');o.value=val;o.textContent=label;sel.appendChild(o);
  });
  // end select: first option = same as start (no end)
  const none=document.createElement('option');none.value='';none.textContent='—（同日）';selEnd.appendChild(none);
  days.forEach(({val,label})=>{
    const o=document.createElement('option');o.value=val;o.textContent=label;selEnd.appendChild(o);
  });
}

  editingId.activity=id;

function initExpenseCharts(trip){

  const cats=Object.keys(catTotals);
  ['chart-pie','chart-bar'].forEach(id=>{if(expenseCharts[id]){expenseCharts[id].destroy();delete expenseCharts[id];}});
  if(!cats.length)return;
  const pie=document.getElementById('chart-pie'),bar=document.getElementById('chart-bar');
  if(pie)expenseCharts['chart-pie']=new Chart(pie,{type:'doughnut',data:{labels:cats,datasets:[{data:cats.map(c=>catTotals[c]),backgroundColor:cats.map(c=>CAT_COLORS[c]||'#95a5a6'),borderWidth:2,borderColor:'white'}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:15},padding:10,color:'#0d0900'}}}}});

function saveExpense(){
  const trip=trips.find(t=>t.id===currentTripId);
  const amount=parseFloat(document.getElementById('exp-amount').value);const name=getExpenseName().trim();
  if(!name||isNaN(amount))return;
  const mo=document.getElementById('exp-month').value,dy=document.getElementById('exp-day-sel').value;
  const data={cat:document.getElementById('exp-cat').value,name,amount,date:mo&&dy?`${mo}-${dy}`:'',note:document.getElementById('exp-note').value};
  if(editingId.expense){const idx=trip.expenses.findIndex(e=>e.id===editingId.expense);if(idx>=0)trip.expenses[idx]={...trip.expenses[idx],...data};}
  else{if(!trip.expenses)trip.expenses=[];trip.expenses.push({id:Date.now().toString(),...data});}
  saveTrips();closeModal('modal-expense');toast(editingId.expense?'費用已更新':'費用已新增');setTimeout(()=>renderTripDetail(trips.find(t=>t.id===currentTripId)),50);

function deleteExpense(id){const trip=trips.find(t=>t.id===currentTripId);trip.expenses=trip.expenses.filter(e=>e.id!==id);saveTrips();renderTripDetail(trip);}

// ===== GLOBAL EXCEL IMPORT =====
function xlsxDateToString(val){
  if(typeof val==='number' && val>10000){
    const d=new Date(Math.round((val-25569)*86400*1000));
    const y=d.getUTCFullYear(),m=String(d.getUTCMonth()+1).padStart(2,'0'),dy=String(d.getUTCDate()).padStart(2,'0');
    return `${y}-${m}-${dy}`;
  }
  if(typeof val==='string' && val.trim()) return val.trim();
  return '';
}

let _importPendingData = null;  // holds parsed rows until user confirms

function importExcel(event){
  const file=event.target.files[0];
  event.target.value='';
  if(!file) return;

  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets['旅程總覽'];
      if(!ws){alert('找不到「旅程總覽」工作表\n請確認使用本系統匯出的 Excel 檔案');return;}
      const rawData=XLSX.utils.sheet_to_json(ws,{header:1}).slice(1).filter(r=>r[0]);

      if(!rawData.length){alert('Excel 中沒有旅程資料');return;}

      // store for later execution
      _importPendingData=rawData;

      // populate modal
      document.getElementById('import-count').textContent=rawData.length;
      // preview list
      const preview=rawData.slice(0,8).map(r=>{
        const name=String(r[0]||'').trim();
        const country=String(r[1]||'').trim();
        const exists=trips.find(t=>t.name===name&&t.country===country);
        return `<span style="margin-right:6px">${exists?'🔄':'✨'}</span>${name}　<span style="color:var(--gold)">${country}</span>${exists?' <span style="color:#e67e22">（已存在）</span>':''}`;
      }).join('<br>');
      document.getElementById('import-preview').innerHTML=
        preview+(rawData.length>8?`<br><span style="color:var(--gold)">…還有 ${rawData.length-8} 筆</span>`:'');

      // reset to default mode
      selectImportMode('add');
      openModal('modal-import-confirm');
    }catch(err){
      console.error(err);
      alert('讀取失敗：'+err.message);
    }
  };
  reader.readAsBinaryString(file);
}

function selectImportMode(mode){
  document.querySelector('input[value="add"]').checked=(mode==='add');
  document.querySelector('input[value="overwrite"]').checked=(mode==='overwrite');
  document.getElementById('import-opt-add').classList.toggle('import-opt-selected', mode==='add');
  document.getElementById('import-opt-overwrite').classList.toggle('import-opt-selected', mode==='overwrite');
}

function cancelImport(){
  _importPendingData=null;
  closeModal('modal-import-confirm');
}

function executeImport(){
  if(!_importPendingData){closeModal('modal-import-confirm');return;}
  const overwrite=document.querySelector('input[name="import-mode"]:checked').value==='overwrite';
  const rawData=_importPendingData;
  _importPendingData=null;
  closeModal('modal-import-confirm');

  let added=0, skipped=0;
  const newTrips=[];

  rawData.forEach(row=>{
    const name=String(row[0]||'').trim();
    const country=String(row[1]||'').trim();
    if(!name) return;
    const startDate=xlsxDateToString(row[2]);
    const endDate=xlsxDateToString(row[3]);
    const budget=String(row[5]||'');
    const tags=String(row[7]||'').split(',').map(s=>s.trim()).filter(Boolean);
    const exists=trips.find(t=>t.name===name&&t.country===country);
    if(!overwrite && exists){skipped++;return;}
    newTrips.push({
      id: exists ? exists.id : (Date.now().toString()+Math.random().toString(36).slice(2)),
      name,country,startDate,endDate,budget,tags,
      emoji:      exists?exists.emoji:'🌏',
      coverPhoto: exists?exists.coverPhoto:null,
      bgColor:    exists?exists.bgColor:BG_COLORS[Math.floor(Math.random()*BG_COLORS.length)],
      itinerary:  exists?exists.itinerary:[],
      checklist:  exists?exists.checklist:[],
      expenses:   exists?exists.expenses:[],
      photos:     exists?exists.photos:[],
      notes:      exists?exists.notes:''
    });
    added++;
  });

  if(overwrite){
    trips=newTrips;
  } else {
    newTrips.forEach(nt=>{
      const idx=trips.findIndex(t=>t.id===nt.id);
      if(idx>=0) trips[idx]=nt; else trips.push(nt);
    });
  }

  saveTrips();
  filterCountry='';
  const fc=document.getElementById('filter-country');
  if(fc) fc.value='';
  updateCountryFilterDropdown();
  showPage('trips');
  updateStats();
  setTimeout(()=>toast(`已匯入 ${added} 筆${skipped?'，略過 '+skipped+' 筆':''}旅程`,'📥'), 300);
}

    <div style="overflow-x:auto"><table class="comp-table">
      <thead><tr><th>旅程</th><th>國家</th><th>天數</th><th>總費用</th><th>每日均費</th><th>交通</th><th>住宿</th><th>餐飲</th><th>門票</th><th>購物</th><th>其他</th></tr></thead>
      <tbody>${filtered.map(t=>{const exps=t.expenses||[];const total=exps.reduce((s,e)=>s+e.amount,0);const days=parseInt(calcDays(t.startDate,t.endDate))||1;const byCat={};exps.forEach(e=>{byCat[e.cat]=(byCat[e.cat]||0)+e.amount;});
        return `<tr><td>${t.emoji} ${t.name}</td><td>${t.country}</td><td style="text-align:center">${days}</td>
        <td style="font-family:var(--font-en);font-size:12px">NT$ ${total.toLocaleString()}</td>
        <td style="font-family:var(--font-en);font-size:12px">NT$ ${Math.round(total/days).toLocaleString()}</td>
        ${['交通','住宿','餐飲','門票','購物','其他'].map(c=>`<td style="text-align:right;font-size:12px">${byCat[c]?'NT$ '+byCat[c].toLocaleString():'—'}</td>`).join('')}</tr>`;}).join('')}
      </tbody>
    </table></div>
  </div>`;
  Object.values(analyticsCharts).forEach(c=>c.destroy());analyticsCharts={};
  setTimeout(()=>{
    const names=filtered.map(t=>t.name.length>7?t.name.slice(0,7)+'…':t.name);
    const totals=filtered.map(t=>(t.expenses||[]).reduce((s,e)=>s+e.amount,0));
    const days=filtered.map(t=>parseInt(calcDays(t.startDate,t.endDate))||0);
    const dailyAvg=filtered.map((t,i)=>days[i]?Math.round(totals[i]/days[i]):0);
    const tripColors=filtered.map((_,i)=>`hsl(${(i*53+185)%360},42%,48%)`);
    const mkBar=(id,labels,data,colors)=>{const el=document.getElementById(id);if(!el)return;return new Chart(el,{type:'bar',data:{labels,datasets:[{data,backgroundColor:colors||'rgba(201,151,58,0.7)',borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'NT$ '+v.toLocaleString()}}}}});};
    analyticsCharts['ac-total']=mkBar('ac-total',names,totals,tripColors);
    const dEl=document.getElementById('ac-days');if(dEl)analyticsCharts['ac-days']=new Chart(dEl,{type:'bar',data:{labels:names,datasets:[{data:days,backgroundColor:'rgba(42,74,74,0.65)',borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{stepSize:1}}}}});
    analyticsCharts['ac-daily']=mkBar('ac-daily',names,dailyAvg,tripColors);
    const catTotals={};filtered.forEach(t=>(t.expenses||[]).forEach(e=>{catTotals[e.cat]=(catTotals[e.cat]||0)+e.amount;}));
    const catEl=document.getElementById('ac-cat');const catKeys=Object.keys(catTotals);
    if(catEl&&catKeys.length)analyticsCharts['ac-cat']=new Chart(catEl,{type:'doughnut',data:{labels:catKeys,datasets:[{data:catKeys.map(c=>catTotals[c]),backgroundColor:catKeys.map(c=>CAT_COLORS[c]||'#95a5a6'),borderWidth:2,borderColor:'white'}]},options:{responsive:true,plugins:{legend:{position:'right',labels:{font:{size:15},padding:12,color:'#0d0900'}}}}});
    const allCats=['交通','住宿','餐飲','門票','購物','其他'];const bkEl=document.getElementById('ac-breakdown');
    if(bkEl)analyticsCharts['ac-breakdown']=new Chart(bkEl,{type:'bar',data:{labels:names,datasets:allCats.map(cat=>({label:cat,data:filtered.map(t=>(t.expenses||[]).filter(e=>e.cat===cat).reduce((s,e)=>s+e.amount,0)),backgroundColor:CAT_COLORS[cat]||'#95a5a6',borderRadius:2}))},options:{responsive:true,scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:v=>'NT$ '+v.toLocaleString()}}},plugins:{legend:{position:'bottom'}}}});
  },80);
}

// ===== CALENDAR =====
function renderCalendar(){
  const list=document.getElementById('calendar-list');
  const sorted=[...trips].filter(t=>t.startDate&&(!filterCountry||t.country===filterCountry)).sort((a,b)=>new Date(a.startDate)-new Date(b.startDate));
  if(!sorted.length){list.innerHTML=`<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">尚無旅程資料</div></div>`;return;}

  // Group by year
  const byYear={};
  sorted.forEach(t=>{
    const y=t.startDate.slice(0,4)||'未知年份';
    if(!byYear[y])byYear[y]=[];
    byYear[y].push(t);
  });
  const years=Object.keys(byYear).sort((a,b)=>b-a); // newest first

  list.innerHTML=years.map(year=>{
    const yearTrips=byYear[year];
    const yearDays=yearTrips.reduce((s,t)=>s+(parseInt(calcDays(t.startDate,t.endDate))||0),0);
    const yearSpent=yearTrips.reduce((s,t)=>s+(t.expenses||[]).reduce((x,e)=>x+e.amount,0),0);
    const rows=yearTrips.map(t=>`
      <div style="background:white;border:1px solid rgba(201,151,58,0.18);border-radius:4px;padding:13px 18px;display:flex;gap:14px;align-items:center;cursor:pointer;margin-bottom:8px;transition:all 0.2s" onclick="openTrip('${t.id}')" onmouseover="this.style.borderColor='var(--gold)';this.style.boxShadow='0 2px 12px rgba(201,151,58,0.15)'" onmouseout="this.style.borderColor='rgba(201,151,58,0.18)';this.style.boxShadow='none'">
        <div style="font-size:26px;flex-shrink:0">${t.emoji}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:600;color:var(--deep-teal);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.name}</div>
          <div style="font-size:12px;color:var(--muted)">${t.startDate} → ${t.endDate||'--'} &nbsp;·&nbsp; ${calcDays(t.startDate,t.endDate)} 天</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:3px">${t.country}</div>
          ${(t.expenses&&t.expenses.length)?`<div style="font-size:11px;color:var(--muted);font-family:var(--font-en)">NT$ ${t.expenses.reduce((s,e)=>s+e.amount,0).toLocaleString()}</div>`:''}
        </div>
      </div>`).join('');

    return `<div style="margin-bottom:32px">
      <div style="display:flex;align-items:baseline;gap:14px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid rgba(201,151,58,0.2)">
        <span style="font-family:var(--font-en);font-size:28px;font-weight:600;color:var(--deep-teal)">${year}</span>
        <span style="font-size:12px;color:var(--muted)">${yearTrips.length} 個旅程</span>
        <span style="font-size:12px;color:var(--muted)">${yearDays} 天</span>
        ${yearSpent?`<span style="font-size:12px;color:var(--muted);margin-left:auto;font-family:var(--font-en)">NT$ ${yearSpent.toLocaleString()}</span>`:''}
      </div>
      ${rows}
    </div>`;
  }).join('');
}

// ===== UTILS =====
let _toastTimer=null;
function toast(msg,icon='✓'){
  const el=document.getElementById('toast');
  el.innerHTML=`<span style="color:var(--gold-light);font-size:15px">${icon}</span> ${msg}`;
  el.classList.add('show');
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}
function saveTrips(){
  const data = JSON.stringify(trips);
  // 1. localStorage (sync, immediate fallback)
  try{ localStorage.setItem(CURRENT_KEY,data); }catch(e){}
  // 2. IndexedDB (primary persistent store)
  _idbSet(CURRENT_KEY, data).then(()=>{
    _showSaveDot(true);
  }).catch(()=>{
    // IndexedDB failed - try window.storage
    if(window.storage&&window.storage.set){
      window.storage.set(CURRENT_KEY,data).then(()=>_showSaveDot(true)).catch(()=>_showSaveDot(false));
    } else {
      _showSaveDot(false);
    }
  });
  // 3. 雲端同步（debounce 1.5s）
  schedulePush();
}
let _saveDotTimer=null;
function _showSaveDot(ok){
  const dot=document.getElementById('save-dot');
  const lbl=document.getElementById('save-label');
  if(!dot) return;
  if(ok){
    dot.style.background='#6b9e6b';
    if(lbl){ lbl.textContent='已儲存'; lbl.style.color='#6b9e6b'; lbl.style.opacity='1'; }
  } else {
    dot.style.background='#c9973a';
    if(lbl){ lbl.textContent='本機儲存'; lbl.style.color='#c9973a'; lbl.style.opacity='1'; }
  }
  clearTimeout(_saveDotTimer);
  _saveDotTimer=setTimeout(()=>{
    if(lbl) lbl.style.opacity='0';
    dot.style.background='#aaa';
  }, 3000);
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});
});

async function showDataDiag(){
  const keys=['yanJunTrips_v4','yanJunTrips_v4_backup'];
  let html='<div style="font-size:13px;line-height:1.9;font-family:var(--font-zh)">';
  html+=`<div style="margin-bottom:12px;font-weight:600;color:var(--deep-teal)">目前載入旅程數：${trips.length} 筆</div>`;
  html+='<div style="font-weight:600;margin-bottom:6px;color:var(--ink)">window.storage（持久儲存）</div>';
  for(const k of keys){
    try{
      const r = await window.storage.get(k);
      if(!r){html+=`<div style="color:var(--muted)">[${k}]：無資料</div>`;continue;}
      const arr=JSON.parse(r.value||'[]');
      html+=`<div style="margin-top:4px"><span style="color:var(--gold);font-weight:600">[${k}]</span>：${arr.length} 筆</div>`;
      arr.slice(0,4).forEach(t=>html+=`<div style="padding-left:14px;color:var(--muted);font-size:12px">• ${t.name||'?'} / ${t.country||''} / ${t.startDate||''}</div>`);
    }catch(e){html+=`<div style="color:#c0392b">[${k}]：${e.message}</div>`;}
  }
  html+='<div style="font-weight:600;margin:12px 0 6px;color:var(--ink)">localStorage（舊版備援）</div>';
  ['yanJunTrips_v4','yanJunTrips','travelTrips','trips'].forEach(k=>{
    try{
      const raw=localStorage.getItem(k);
      if(!raw){html+=`<div style="color:var(--muted)">[${k}]：無資料</div>`;return;}
      const arr=JSON.parse(raw);
      html+=`<div><span style="color:var(--gold)">[${k}]</span>：${arr.length} 筆</div>`;
    }catch(e){}
  });
  html+='</div>';
  document.getElementById('diag-body').innerHTML=html;
  openModal('modal-diag');
}

init();
